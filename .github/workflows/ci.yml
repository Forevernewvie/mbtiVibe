name: CI

on:
  pull_request:
    branches:
      - main
      - codex/develop
  push:
    branches:
      - main
      - codex/develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: "1"
  DATABASE_URL: postgresql://ci_user:ci_pass@localhost:5432/ci_db?schema=public
  APP_URL: https://example.com
  PAYMENT_PROVIDER: manual
  ADMIN_API_TOKEN: ci-admin-token

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
